version: 2
updates:

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 1
  commit-message:
      prefix: "chore"
      include: "scope"
  groups:
    all:
      patterns:
        - "*"
  labels:
    - "chore"
    - "team-developer-support"

- package-ecosystem: "npm"
  directory: '/'
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 1
  commit-message:
      prefix: "chore"
      include: "scope"
  groups:
    all:
      patterns:
        - "*"
  ignore:
    - dependency-name: "@actions/core"
      update-types: ["version-update:semver-major"]
    - dependency-name: "@actions/exec"
      update-types: ["version-update:semver-major"]
  labels:
    - "chore"
    - "team-developer-support"

